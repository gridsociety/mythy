name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  licenses:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Generate THIRD_PARTY_LICENSES
        run: |
          set -euo pipefail
          go install github.com/google/go-licenses@v1.6.0
          TMP="$(mktemp -d)"
          "$(go env GOPATH)/bin/go-licenses" save ./cmd/mythy \
            --save_path="$TMP/lic" \
            --ignore github.com/gridsociety/mythy \
            --force
          {
            echo "Third-party licenses bundled with mythy"
            echo "========================================"
            echo
            find "$TMP/lic" -type f | sort | while read -r f; do
              mod="$(dirname "${f#$TMP/lic/}")"
              echo "## $mod"
              echo "----------------------------------------"
              echo
              cat "$f"
              echo
              echo
            done
          } > THIRD_PARTY_LICENSES
      - uses: actions/upload-artifact@v7
        with:
          name: third-party-licenses
          path: THIRD_PARTY_LICENSES
          if-no-files-found: error
          retention-days: 1

  build:
    needs: [test, licenses]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: '386'              }
          - { goos: linux,   goarch: amd64              }
          - { goos: linux,   goarch: arm,    goarm: '7' }
          - { goos: linux,   goarch: arm64              }
          - { goos: darwin,  goarch: amd64              }
          - { goos: darwin,  goarch: arm64              }
          - { goos: windows, goarch: '386'              }
          - { goos: windows, goarch: amd64              }
          - { goos: windows, goarch: arm64              }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: third-party-licenses
          path: .
      - name: Build & package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BIN="mythy"
          [ "$GOOS" = windows ] && BIN="mythy.exe"
          mkdir -p build dist
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "build/${BIN}" \
            ./cmd/mythy
          cp LICENSE THIRD_PARTY_LICENSES build/
          ARCH="${GOARCH}"
          [ -n "${GOARM:-}" ] && ARCH="armv${GOARM}"
          STEM="mythy-${VERSION}-${GOOS}-${ARCH}"
          if [ "$GOOS" = windows ]; then
            (cd build && zip "../dist/${STEM}.zip" "$BIN" LICENSE THIRD_PARTY_LICENSES)
          else
            tar -C build -czf "dist/${STEM}.tar.gz" "$BIN" LICENSE THIRD_PARTY_LICENSES
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: mythy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
